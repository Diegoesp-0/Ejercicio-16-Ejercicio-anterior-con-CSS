<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Espiritu Manzanarez Diego Manuel - Ejercicio #16</title>
    <link rel="stylesheet" href="prestamos.css" />
  </head>
  <body>
    <form>
      <h1>Prestamos</h1>
      <label>Nombre:</label><br />
      <input type="text" name="nombre" /><br /><br />

      <label>Carrera:</label><br />
      <input type="text" name="carrera" /><br /><br />

      <label>Grupo:</label><br />
      <input type="text" name="grupo" /><br /><br />

      <label>Semestre:</label><br />
      <input type="radio" name="semestre" value="C" /> C
      <input type="radio" name="semestre" value="G" /> G
      <input type="radio" name="semestre" value="S" /> S
      <input type="radio" name="semestre" value="IP" /> IP
      <input type="radio" name="semestre" value="IN" /> IN
      <input type="radio" name="semestre" value="A" /> A
      <input type="radio" name="semestre" value="P" /> P <br /><br />

      <label>Alum/Prof:</label><br />
      <input type="radio" name="tipo_usuario" value="alumno" /> Alumno
      <input type="radio" name="tipo_usuario" value="profesor" /> Profesor
      <br /><br />

      <label>Prestamo:</label><br />
      <input type="text" name="prestamo" /><br /><br />

      <label>Fecha:</label><br />
      <input type="date" name="fecha_prestamo" /><br /><br />

      <label>Hora:</label><br />
      <input type="time" name="hora_prestamo" /><br /><br />

      <label>Hr. de prestamo:</label><br />
      <input type="text" name="hr_prestamo" /><br /><br />

      <label>Firma:</label><br />
      <input type="text" name="firma_prestamo" /><br /><br />

      <label>Fecha de entrega:</label><br />
      <input type="date" name="fecha_entrega" /><br /><br />

      <label>Hora de entrega:</label><br />
      <input type="time" name="hora_entrega" /><br /><br />

      <label>Hr. de entrega:</label><br />
      <input type="text" name="hr_entrega" /><br /><br />

      <label>Firma de entrega:</label><br />
      <input type="text" name="firma_entrega" /><br /><br />

      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
